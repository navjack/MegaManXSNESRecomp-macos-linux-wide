# bank00.cfg — Rockman X (Japan) v1.1
#
# Minimal seed for the first JP recompile baseline: read the SNES vector
# table from ROM at $00:FFE0-FFFF and let the recompiler auto-discover the
# rest via static reachability + dispatch-table scans. Address-specific
# fixes (dispatch classes, inline-arg calls, cinematic indirects) are
# re-derived against JP addresses in a later pass — the USA fixes in
# ../../../recomp/bank00.cfg do NOT transfer directly (bank 0 is only
# ~11% byte-identical to USA).
#
# The reset stub at $00:8000 is byte-identical to USA:
#   78 18 fb 5c 07 80 80 9c  = SEI; CLC; XCE; JML $80:8007
# so the boot entry structure matches; only downstream code shifts.

bank = 0
auto_vectors

# ── Boot return path (byte-identical to USA at $8007-$8097) ──────────────
# Without an end: boundary, auto-discovery let ResetHandler decode its
# $8094 `JMP $8099` tail and swallow the infinite $8099 scheduler loop, so
# I_RESET never returned to the runner (frame-0 wedge). Bound ResetHandler
# before $8099 and make the $8099 main loop a returnable no-op: I_RESET then
# returns and the runner drives the per-frame scheduler (LLE:
# interp_bridge_run_scheduler). The $8007-$8097 body + the $8094 JMP $8099
# are byte-identical to USA (only one upstream byte at $8086 differs).
func ResetHandler 8007 end:8097
func MainLoopStub 8099
hle_func 8099 HleMmxMainLoopReturn

# ── Cooperative task scheduler (byte-identical to USA at $8099-$810F) ──
# $00:80E6 = JMP ($0032,X) fresh-dispatch; $80F8 = TaskDie. HLE'd by the
# C-host scheduler in src/mmx_rtl.c (fiber-based). NOTE: the task-PC
# table in mmx_dispatch_task_pc() is USA-specific and must be re-derived
# for JP (JP task entry PCs differ) — tracked separately.
func TaskDie 80f8
hle_func 80f8 HleMmxTaskDie
hle_dispatch 80e6 HleMmxSchedulerDispatch
