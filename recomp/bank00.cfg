# bank00.cfg — Mega Man X
#
# Minimum viable seed: read the SNES interrupt vector table directly
# from the ROM at $00:FFE0-FFFF. The recompiler auto-discovers more
# from static reachability + dispatch-table scans.

bank = 0

# Read the SNES vector table (I_RESET, I_NMI, I_IRQ) directly from
# ROM bytes at $00:FFE0-FFFF.
auto_vectors

# Mega Man X uses long-mode (JML) vectors: the stubs at $00:8000,
# $00:FFA4, $00:FFA8 immediately JML into bank $80. Banks $80-$BF
# are LoROM mirrors of $00-$3F (same physical bytes), so declare
# the real handler entries against their $00 PC and alias the $80
# cross-bank names so the JML resolves.
func ResetHandler 8007
func NmiHandler   8168
func IrqHandler   84a1
name 808007 ResetHandler
name 808168 NmiHandler
name 8084a1 IrqHandler

# TODO: identify the per-frame "tick the game state once" function
# and declare it here. MMX's asm main loop at $00:8099 is structured
# as:
#   $8099  REP #$10 ; LDX #$02FF ; TXS ; SEP #$30
#   $80A1  LDA $0B9D ; BEQ -3     ; spinlock on NMI vblank flag
#   $80A6  INC $0B9B               ; frame counter
#   $80A9  LDX #$00
#   $80AB  loop: LDA $30,X
#          CMP #$01 ; BEQ $80DA   ; dispatch type 1 (handler at $80DA)
#          CMP #$02 ; BNE +4
#          DEC $31,X ; BEQ $80E9  ; dispatch type 2 (handler at $80E9)
#          TXA ; CLC ; ADC #$10 ; TAX
#          CPX #$60 ; BEQ $80CC    ; dispatch on slot reaching $60
#          CPX #$70 ; BNE loop
#   $80C6  STZ $0B9D                ; clear NMI flag
#   $80C9  JMP $8099                ; back to start
#
# Truncating at end:$80C9 trips the "unresolvable cross-fn goto"
# class because the STZ at $80C6 falls through to a PC outside the
# function. Three of the branches ($80DA, $80E9, $80CC) also point
# to handler bodies that need their own `func` entries. Wire those
# all up before declaring MainLoop here.
