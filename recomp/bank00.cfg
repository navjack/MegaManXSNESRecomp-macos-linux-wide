# bank00.cfg — Mega Man X
#
# Minimum viable seed: read the SNES interrupt vector table directly
# from the ROM at $00:FFE0-FFFF. The recompiler auto-discovers more
# from static reachability + dispatch-table scans.

bank = 0

# Read the SNES vector table (I_RESET, I_NMI, I_IRQ) directly from
# ROM bytes at $00:FFE0-FFFF.
auto_vectors

# Phase-4 bank-miss tier-down (game-wide): unresolved cross-ROM-bank calls
# (banks $09+ are not translated) run their real bytes on the interpreter
# tier instead of the stack-safe drop. Root cause for enabling (2026-07-02):
# the rich-LLE bounced-vs-interpreted co-sim differential split at ~f522 on
# exactly this — compiled bodies DROPPED per-frame calls into bank $09/$0D
# SEC;XCE routines ($09:A8B4/$09:C6C4/$0D:996B candidates) that the interp
# side faithfully ran, leaving an emulation-mode IRQ push residue at $02FF.
# Dropping real code is never faithful; every such call now executes.
tier_down_stubs

# Mega Man X uses long-mode (JML) vectors: the stubs at $00:8000,
# $00:FFA4, $00:FFA8 immediately JML into bank $80. Banks $80-$BF
# are LoROM mirrors of $00-$3F (same physical bytes), so declare
# the real handler entries against their $00 PC and alias the $80
# cross-bank names so the JML resolves.
func ResetHandler 8007 end:8097
func NmiHandler   8168
func IrqHandler   84a1
name 808007 ResetHandler
name 808168 NmiHandler
name 8084a1 IrqHandler

# Soft-reset entry at $00:8016 — same body as ResetHandler but skips
# the initial $4200/420C/420B clearing + the `STA $7E:FFFF` self-progress
# zero-out. ~31 sites in bank 00 do `BIT $213F ; BEQ +4 ; JMP $80:8016`
# (PAL/NTSC detect via PPU status, soft-restart on mismatch). Declare
# as its own func so those gotos resolve to a tail-call instead of a
# cross-fn-goto trap to an unnamed address. Overlaps ResetHandler;
# both decode the shared tail independently.
func SoftReset 8016 end:8097
name 808016 SoftReset

# Asm main loop at $00:8099 is HLE-replaced by MmxSchedulerTick in
# mmx_rtl.c. The recompiler-emitted MainLoopStub here is just a
# no-op return so ResetHandler's JMP $8099 (at $8094) becomes a
# tail-call into a returnable function. C-host then takes over the
# per-frame loop directly via MmxSchedulerTick.
func MainLoopStub 8099
hle_func 8099 HleMmxMainLoopReturn

# Task entry PCs — installed via `LDA #$<pc16> ; [LDX #$<slot>] ;
# JSR/JSL $00:813B`. The recompiler doesn't auto-promote these
# (they're LDA-immediate operands, not Call targets), so they have
# to be declared explicitly. Six entries discovered by scanning
# bank-00 ROM for the install pattern; subsequent task spawns
# (sub-tasks) need to be added here as they're found.
#   $852C  Task0  — boot / attract sequence
#   $89C9         — slot-4 reveal task: JSR $8973 (fade-IN) then TaskDie
#                   (discovered in attract bring-up)
#   $89DB         — slot-4 fade-OUT/blank task: the SIBLING of $89C9
#                   (installed by $8C58 before a stage bulk-load to drive
#                   fade-out -> forced-blank). Missing it meant slot 4's
#                   fade-out handler hit mmx_dispatch_task_pc's default and
#                   was silently dropped, so the Highway stage streamed its
#                   bulk BG onto a lit screen (no re-blank). See ISSUES.md.
#   $B091         — sub-task installed mid-attract
#   $B25B         — sub-task installed mid-attract
#   $B38D         — sub-task installed mid-attract
#   $B436         — sub-task installed mid-attract
#   $E6B1         — separate top-level task
func Task0       852c
func Task_89C9   89c9
func Task_89DB   89db
func Task_B091   b091
func Task_B25B   b25b
func Task_B38D   b38d
func Task_B436   b436
func Task_E6B1   e6b1

# Primitive yield wrappers — both BRA into the scheduler's next-slot
# path at $80B9 and never return to the caller. Hand-written HLE
# bodies in `gen_stubs.c` longjmp back to the C-host scheduler instead.
#   $8100: yield with countdown=1 (wake next frame)
#   $810C: yield with countdown=A (caller-supplied)
# $8A45, $8995 end with a JMP/JSR to one of these so they don't
# need separate HLE — their work runs as normal recomp'd code and
# the inner yield trampoline longjmps out.
func YieldOneFrame 8100
func YieldNFrames  810c
hle_func 8100 HleMmxYieldOneFrame
hle_func 810c HleMmxYieldNFrames

# $8121 is a *conditional* yield: `BIT $0B9D ; BMI yield ; RTS`. The
# BMI-taken path PHA/PHY/PHP, sets slot state=$02 cd=$01, TSCs the
# saved-S into $34,X, and JMPs to $8099 (the asm scheduler's outer
# loop). The asm scheduler later resumes this task via $80E9
# (REP #$30 ; TCS to $34,X ; PLP ; PLY ; PLX ; RTS) which pops back
# through the JSR return into the caller. In our C-host fiber model
# the asm coroutine-resume path is replaced by SwitchToFiber, so the
# JMP $8099 (HLE-replaced by MainLoopReturn) can't drive a yield —
# the asm body would just fall out leaving 3 bytes pushed onto the
# emulated stack that the asm scheduler was supposed to pop, and
# the caller's PLB/PLP/PLY/PLX at the post-JSR site reads the wrong
# bytes. Replace the whole conditional with a host-aware HLE.
#
# Note: the asm always-on `waiting_for_vblank` flag at $0B9D is
# set to $FF every host frame before MmxSchedulerTick runs, so the
# BMI path is ALWAYS taken under our scheduler — every Task body
# that uses $8121 (Task_B25B's decompressor at $B2D0, etc.) was
# hitting this stack-corruption every iteration.
func YieldVblank 8121
hle_func 8121 HleMmxYieldVblank

# Asm yield-and-die path at $00:80F8 (SEP #$30 ; LDX $A0 ; STZ $30,X ;
# BRA $80B9). A task uses this to mark its own slot empty and return
# control to the scheduler. Tasks reach $80F8 via JMP from many sites
# in bank 00 (e.g. Task_B25B at $00:B2E8). Without HLE'ing this, the
# decoder inlines $80F8's tail (which iterates slots, finds slot 0 in
# state=2, falls into the asm coroutine-resume at $80E9, writes state=3
# to slot 0, and attempts a TCS+PLP+PLY+PLX+RTS coroutine resume that
# corrupts cpu state under the C-host fiber scheduler). HLE replaces
# the whole tail with a C stub that marks the current slot empty and
# SwitchToFibers back to the host scheduler.
func TaskDie 80f8
hle_func 80f8 HleMmxTaskDie

# Cooperative-task-scheduler dispatch — $00:80E6 is `JMP ($0032,X)`,
# the state-1 fresh-dispatch site (TCS to slot's entry-S, then jump
# to the handler PC stored at $0032+slot_off). The decoder inlines
# this dispatch into ~27 caller bodies (Task0, plus every yield path
# that BRAs back into the slot loop). We replace each inlined copy
# with a tail-call into HleMmxSchedulerDispatch; the C-host scheduler
# in mmx_rtl.c handles the actual task selection (mmx_dispatch_task_pc).
hle_dispatch 80e6 HleMmxSchedulerDispatch

# TODO: HLE the cooperative task scheduler at $00:8099.
#
# Confirmed against the public disassembly at
# https://github.com/MarkAlarm/MMX1-Disassembly. The asm at $8099 is
# a *cooperative-coroutine task scheduler*, not a normal frame loop:
#
#   slot fields per 16-byte slot in $0030-$006F (4 task slots):
#     $30,X = state (0=empty, 1=ready, 2=delayed, 3=suspended)
#     $31,X = delay countdown (state 2)
#     $32,X / $33,X = handler PC (16-bit, used for JMP (abs,X) at $80E6)
#     $34,X / $35,X = saved S (16-bit, used to resume state-3 tasks)
#     $36,X / $37,X = entry-task S setup (16-bit, used for state-1 start)
#
#   $80A1-$80A5  spin on $0B9D (vblank flag); NMI sets to $FF
#   $80A6        INC $0B9B (frame counter)
#   $80AB-$80C4  iterate X = 0,$10,$20,..,$60: dispatch by state
#     state=1 -> $80DA: TCS to slot's entry-S, JMP ($0032,X)
#     state=2 (expired) -> $80E9: REP #$30, TCS to saved-S, PLP/PLY/PLX/RTS
#                                 (resume the suspended task)
#     state=3 (already-running, suspended) -> X+=$10, continue loop
#   $80C6  STZ $0B9D
#   $80C9  JMP $8099    (infinite outer loop)
#
# Tasks yield via $80F8:  SEP #$30 ; LDX $A0 ; STZ $30,X ; BRA $80B9
# (mark slot as ready, fall back into the dispatch loop's next-slot path).
#
# To run this from C-host without infinite-looping, we need a
# C-side scheduler that:
#   1. Iterates the four task slots one per frame call (the C function
#      returns to the runner instead of spinning on $0B9D).
#   2. For state=1 slots, JSRs into the cfg-named handler whose
#      address is at ($0032+slot_off). This requires declaring every
#      task entry-PC as a cfg `func` (4 initial tasks + every task
#      they spawn).
#   3. For state=3 slots, restores the saved stack frame the same way
#      Zelda's `ZeldaRunPolyLoop` does, then JSRs into the handler
#      at the post-yield PC.
#
# This is the largest remaining MMX gap. The JMP ($0032,X) at $80E6
# is the indirect-dispatch site reported by v2_regen — authorising it
# manually requires per-task-slot enumeration of installed handler PCs.
